<style>
:root{--bg:#e8e0d5;--deep:#3d1a2e;--deep2:#2a0f1f;--cream:#f0e8dd;--yellow:#f5d800;--yellow2:#e8c800;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(240,232,221,0.13);--muted:rgba(240,232,221,0.42)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.35}
.frame{position:relative;z-index:1;background:var(--deep);min-height:100vh;border:10px solid var(--bg)}
header{position:relative;overflow:hidden;padding:2.5rem 2rem 1.8rem;text-align:center;border-bottom:2px solid rgba(245,216,0,0.18)}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(100,40,80,0.65) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 70%,rgba(80,20,60,0.45) 0%,transparent 60%);pointer-events:none}
.hi{position:relative;z-index:1}
.wm{font-family:'Share Tech Mono',monospace;font-size:clamp(2.8rem,9vw,5.5rem);letter-spacing:0.12em;line-height:0.9;color:var(--yellow);text-transform:uppercase;text-shadow:4px 4px 0 rgba(0,0,0,0.5)}
.sl{font-family:'Share Tech Mono',monospace;font-size:clamp(0.7rem,1.8vw,0.9rem);letter-spacing:0.22em;text-transform:uppercase;color:var(--cream);margin-top:0.5rem;opacity:0.65}
.hm{display:flex;align-items:center;justify-content:center;gap:1.25rem;margin-top:1.1rem;flex-wrap:wrap}
.hb{display:inline-flex;align-items:center;gap:0.3rem;background:var(--yellow);color:var(--deep2);font-family:'Share Tech Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;padding:0.28rem 0.85rem;clip-path:polygon(8% 0%,92% 0%,100% 50%,92% 100%,8% 100%,0% 50%);text-transform:uppercase}
.hd{font-family:'Share Tech Mono',monospace;font-size:clamp(0.95rem,2.5vw,1.5rem);color:var(--cream);letter-spacing:0.08em}
.hl{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;margin-top:0.35rem}
.sb{position:sticky;top:0;z-index:200;background:var(--deep2);border-bottom:2px solid rgba(245,216,0,0.2)}

<script>
(function(){const c=document.getElementById('stars'),ctx=c.getContext('2d');let W,H,S=[];function r(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}function mk(){S=[];for(let i=0;i<200;i++)S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+0.2,a:Math.random(),s:(Math.random()-0.5)*0.006,cx:Math.random()>0.83})}function dr(){ctx.clearRect(0,0,W,H);S.forEach(s=>{s.a=Math.max(0.05,Math.min(1,s.a+s.s));if(s.a<=0.05||s.a>=1)s.s*=-1;ctx.globalAlpha=s.a;if(s.cx){ctx.fillStyle='#c8b0e0';ctx.fillRect(s.x-s.r*.4,s.y-s.r*2.2,s.r*.8,s.r*4.4);ctx.fillRect(s.x-s.r*2.2,s.y-s.r*.4,s.r*4.4,s.r*.8)}else{ctx.fillStyle=s.r>1?'#b8a8d8':'#e0d8f0';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}});ctx.globalAlpha=1;requestAnimationFrame(dr)}r();mk();dr();window.addEventListener('resize',()=>{r();mk()})})();

const TR={
  'Konzert':{color:'#f5d800',icon:'🎸'},
  'DJ-Set':{color:'#ff4560',icon:'🎛️'},
  'Workshop':{color:'#00e5a0',icon:'🛠️'},
  'Vortrag':{color:'#a78bfa',icon:'🎤'},
  'Performance':{color:'#ff9f40',icon:'🎭'},
  'Theater':{color:'#c084fc',icon:'🎬'},
  'Tanz':{color:'#38d9f5',icon:'💃'},
  'Film':{color:'#4ade80',icon:'🎞️'},
  'Jamsession':{color:'#fb923c',icon:'🥁'},
};
const RI={'Triebwerk':'🔊','Maschinenraum':'⚙️','Zeitkapsel':'⏳','Funkraum':'📡','Rohteilchenbeschleuniger':'⚡','Landeplatz':'🛸','Satelit':'🌙','Sternenwiese':'🌟','B.U.S.':'🚌'};
const RO=['Triebwerk','Rohteilchenbeschleuniger','Satelit','Zeitkapsel','Sternenwiese','Landeplatz','Funkraum','Maschinenraum','B.U.S.'];
const SK=new Set(['Team-Einreichung','Soundcheck']);
const tc=t=>TR[t]?.color||'rgba(240,232,221,0.35)';
const ti=t=>TR[t]?.icon||'✦';
const BASE='https://cfp.kntkt.de';
const XML_URL='https://cfp.kntkt.de/kontakt-2026/schedule/export/schedule.xml';
const PROXY='https://corsproxy.io/?url=';

const WDAY=['So','Mo','Di','Mi','Do','Fr','Sa'];
function dlbl(ds){const d=new Date(ds+'T12:00:00');return`${WDAY[d.getDay()]} ${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}`}

let aday=0,afil=new Set(),rfil=new Set(),DAYS=[];

// Parse pretalx XML into our DAYS structure
function txt(el,tag){
  // Only search direct children to avoid cross-contamination
  for(const c of el.children){if(c.tagName===tag)return c.textContent.trim();}
  return '';
}

function parseXML(xmlText){
  const doc=new DOMParser().parseFromString(xmlText,'text/xml');
  const days=[];
  const dayEls=doc.getElementsByTagName('day');
  for(const dayEl of dayEls){
    const date=dayEl.getAttribute('date');
    if(!date)continue;
    const rooms={};
    // Only direct room children of this day
    for(const roomEl of dayEl.children){
      if(roomEl.tagName!=='room')continue;
      const rn=roomEl.getAttribute('name');
      if(!rn)continue;
      const evs=[];
      // Only direct event children of this room
      for(const ev of roomEl.children){
        if(ev.tagName!=='event')continue;
        const track=txt(ev,'track');
        if(SK.has(track))continue;
        const logo=txt(ev,'logo');
        // persons are nested one level deeper
        const persons=[];
        for(const c of ev.children){
          if(c.tagName==='persons'){
            for(const p of c.children){
              if(p.tagName==='person'&&p.textContent.trim())persons.push(p.textContent.trim());
            }
          }
        }
        const trNorm=track.replace(/ regional$/,'');
        evs.push({
          t: txt(ev,'title'),
          tr: trNorm||null,
          s: txt(ev,'start')||'00:00',
          d: txt(ev,'duration')||'00:30',
          l: logo?BASE+logo:'',
          desc: txt(ev,'description').replace(/^None$/,''),
          u: txt(ev,'url'),
          p: persons
        });
      }
      if(evs.length)rooms[rn]=evs;
    }
    if(Object.keys(rooms).length)days.push({date,rooms});
  }
  return days.filter(d=>Object.keys(d.rooms).length>0);
}

function initUI(){
  const allT=new Set();
  DAYS.forEach(d=>Object.values(d.rooms).forEach(evs=>evs.forEach(e=>{if(e.tr&&!SK.has(e.tr))allT.add(e.tr)})));
  const fiEl=document.getElementById('trackFilters');
  while(fiEl.children.length>1)fiEl.removeChild(fiEl.lastChild);
  allT.forEach(track=>{
    const p=document.createElement('button');p.className='tp';p.dataset.track=track;
    p.style.setProperty('--pc',tc(track));
    p.innerHTML=`<span class="pi">${ti(track)}</span>${track}`;
    p.addEventListener('click',()=>{if(afil.has(track)){afil.delete(track);p.classList.remove('active')}else{afil.add(track);p.classList.add('active')}rd(aday)});
    fiEl.appendChild(p);
  });

  function buildRoomFilters(dayIdx){
    const rfEl=document.getElementById('roomFilters');
    while(rfEl.children.length>1)rfEl.removeChild(rfEl.lastChild);
    rfil.clear();
    const day=DAYS[dayIdx];
    const rooms=[...RO.filter(r=>day.rooms[r]?.length),...Object.keys(day.rooms).filter(r=>!RO.includes(r)&&day.rooms[r]?.length).sort()];
    rooms.forEach(rn=>{
      const p=document.createElement('button');p.className='tp';
      p.style.setProperty('--pc','rgba(240,232,221,0.55)');
      p.innerHTML=`<span class="pi">${RI[rn]||'◆'}</span>${rn}`;
      p.addEventListener('click',()=>{
        if(rfil.has(rn)){rfil.delete(rn);p.classList.remove('active')}
        else{rfil.add(rn);p.classList.add('active')}
        rd(aday);
      });
      rfEl.appendChild(p);
    });
  }

  const tabEl=document.getElementById('dayTabs');
  tabEl.innerHTML='';
  DAYS.forEach((day,i)=>{
    const tab=document.createElement('div');tab.className='dta'+(i===0?' active':'');
    tab.textContent=dlbl(day.date);
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.dta').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');aday=i;
      buildRoomFilters(i);
      rd(i);
    });
    tabEl.appendChild(tab);
  });
  buildRoomFilters(0);
  rd(0);
}

function showStatus(msg,isError){
  document.getElementById('mainContent').innerHTML=
    `<p class="ed" style="color:${isError?'#ff4560':'var(--yellow)'}">${msg}</p>`;
}

async function loadSchedule(){
  showStatus('✦ Lade Programm …');
  let xml;
  // Try direct first (works when hosted on same domain or if CORS opens up)
  try{
    const r=await fetch(XML_URL,{cache:'no-cache'});
    if(!r.ok)throw new Error('direct failed');
    xml=await r.text();
  }catch{
    // Fallback: CORS proxy
    try{
      showStatus('✦ Verbinde via Proxy …');
      const r=await fetch(PROXY+encodeURIComponent(XML_URL),{cache:'no-cache'});
      if(!r.ok)throw new Error('proxy failed');
      xml=await r.text();
    }catch(e){
      showStatus('✗ Programm konnte nicht geladen werden. Bitte Seite neu laden.',true);
      return;
    }
  }
  DAYS=parseXML(xml);
  if(!DAYS.length){showStatus('✗ Keine Daten gefunden.',true);return;}
  initUI();
}

loadSchedule();
function fd(d){const[h,m]=d.split(':').map(Number);return!h?`${m}min`:!m?`${h}h`:`${h}h${m}`}


// Per-image object-position: 'top center' for band/person photos, 'center' for logos/artworks
const IP={'C8YAFV':'center','TTW8JN':'center','ESZ9AW':'center','ZTDLEM':'center',

function imgPos(url){const m=url&&url.match(/submissions\/([A-Z0-9]+)\//);return(m&&IP[m[1]])||'top center';}

// Convert HH:MM to minutes since midnight (times < 06:00 = next day = +1440)
function toMin(t){const[h,m]=t.split(':').map(Number);const total=h*60+m;return total<360?total+1440:total;}
// Gap in px: proportional but capped so huge pauses don't blow up the layout
const PX_PER_MIN=0.9;
const GAP_MAX=56;   // max px between two events
const GAP_MIN=6;    // min gap (breathing room)

function rd(idx){
  const main=document.getElementById('mainContent');main.innerHTML='';
  const day=DAYS[idx];
  const rooms=[...RO.filter(r=>day.rooms[r]?.length),...Object.keys(day.rooms).filter(r=>!RO.includes(r)&&day.rooms[r]?.length).sort()];
  if(!rooms.length){main.innerHTML='<p class="ed">✦ Keine Programmpunkte</p>';return}
  const grid=document.createElement('div');grid.className='rg';
  const orderedRooms=rfil.size>0
    ?[...rooms.filter(r=>rfil.has(r)),...rooms.filter(r=>!rfil.has(r))]
    :rooms;
  // scroll to start when reordering
  if(rfil.size>0)setTimeout(()=>grid.scrollTo({left:0,behavior:'smooth'}),50);

  // Find the earliest start time across all rooms for this day (for top-alignment)
  let dayStart=Infinity;
  rooms.forEach(rn=>day.rooms[rn].forEach(ev=>{const m=toMin(ev.s);if(m<dayStart)dayStart=m;}));

  orderedRooms.forEach(rn=>{
    const events=[...day.rooms[rn]].sort((a,b)=>toMin(a.s)-toMin(b.s));
    const col=document.createElement('div');col.className='rc';
    col.style.transition='opacity 0.3s';
    if(rfil.size>0&&!rfil.has(rn))col.style.opacity='0.1';
    col.innerHTML=`<div class="rh"><span>${RI[rn]||'◆'}</span>${rn}</div><div class="re"></div>`;
    const evW=col.querySelector('.re');

    // Top offset: align this room's first event relative to the day's earliest start
    const roomStart=toMin(events[0].s);
    const topOffset=Math.min((roomStart-dayStart)*PX_PER_MIN, GAP_MAX*3);
    evW.style.paddingTop=topOffset+'px';

    let prevEnd=null; // minutes when previous event ends
    events.forEach(ev=>{
      if(SK.has(ev.tr))return;
      const color=tc(ev.tr),icon=ti(ev.tr);
      const card=document.createElement('div');card.className='ec';
      card.style.setProperty('--tc',color);
      if(afil.size>0&&!(ev.tr&&afil.has(ev.tr)))card.classList.add('dm');

      // Gap between this event and the previous one
      if(prevEnd!==null){
        const evStart=toMin(ev.s);
        const gapMin=Math.max(0,evStart-prevEnd);
        const gapPx=Math.min(gapMin*PX_PER_MIN, GAP_MAX);
        card.style.marginTop=Math.max(gapPx,GAP_MIN)+'px';
      }
      // Parse duration to minutes for next gap calculation
      const[dh,dm]=(ev.d||'00:30').split(':').map(Number);
      prevEnd=toMin(ev.s)+(dh*60+dm);

      let h='';
      if(ev.l){
        const ew=document.createElement('div');ew.className='ew';
        const bg=document.createElement('div');bg.className='ew-bg';
        bg.style.backgroundImage=`url('${ev.l}')`;
        const img=document.createElement('img');img.className='et';
        img.alt='';img.loading='lazy';img.src=ev.l;
        img.onerror=()=>{ew.remove();card.classList.add('noimg')};
        ew.appendChild(bg);ew.appendChild(img);
        card.appendChild(ew);
        const scrim=document.createElement('div');scrim.className='escrim';
        card.appendChild(scrim);
      } else {
        card.classList.add('noimg');
      }
      const ov=document.createElement('div');ov.className='eov';
      h+=`<div class="eto"><span class="etm">${ev.s}</span><span class="edu">${fd(ev.d)}</span></div>`;
      h+=`<div class="eti">${ev.t}</div>`;
      h+=`<div class="em">`;
      if(ev.tr)h+=`<span class="eb" style="background:${color}"><span class="bi">${icon}</span>${ev.tr}</span>`;
      h+=`</div>`;
      if(ev.p?.length)h+=`<div class="ea">${ev.p.join(', ')}</div>`;
      ov.innerHTML=h;
      card.appendChild(ov);
      card.addEventListener('click',()=>openM(ev));
      evW.appendChild(card);
    });
    grid.appendChild(col);
  });
  main.appendChild(grid);
}

function openM(ev){
  const color=tc(ev.tr),icon=ti(ev.tr);
  const wrap=document.getElementById('mheroWrap');
  const hero=document.getElementById('mhero');
  const bg=document.getElementById('mheroBg');
  if(ev.l){
    hero.src=ev.l;
    bg.style.backgroundImage=`url('${ev.l}')`;
    wrap.style.display='grid';
  }else{wrap.style.display='none'}
  const tb=document.getElementById('mtb');
  tb.innerHTML=`<span class="bi">${icon}</span>${ev.tr||'Programm'}`;
  tb.style.background=color;
  document.getElementById('mn').textContent=ev.t;
  document.getElementById('minf').innerHTML=`<span>⬡ ${ev.s} Uhr</span><span>◷ ${fd(ev.d)}</span>`+(ev.p?.length?`<span>✦ ${ev.p.join(', ')}</span>`:'');
  document.getElementById('mde').textContent=(ev.desc||'').trim();
  document.getElementById('mlink').href=ev.u||'#';
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}
document.getElementById('mcl').addEventListener('click',closeM);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});
function closeM(){document.getElementById('mo').classList.remove('open');document.body.style.overflow=''}
